services:
  # RTSP relay — receives audio from the host-side ffmpeg mic bridge
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: bird-ears-rtsp
    ports:
      - "8554:8554"
    restart: unless-stopped

  birdnet-go:
    image: ghcr.io/tphakala/birdnet-go:nightly
    container_name: bird-ears-birdnet
    ports:
      - "${WEB_PORT:-8080}:8080"
    environment:
      - TZ=${TZ:-UTC}
      - BIRDNET_UID=${BIRDNET_UID:-1000}
      - BIRDNET_GID=${BIRDNET_GID:-1000}
    volumes:
      - ./config:/config
      - ./data:/data
    tmpfs:
      - /config/hls:exec,size=50M,uid=${BIRDNET_UID:-1000},gid=${BIRDNET_GID:-1000},mode=0755
    depends_on:
      - mediamtx
    restart: unless-stopped
