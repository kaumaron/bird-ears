services:
  # RTSP relay — receives audio from the host-side ffmpeg mic bridge
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: bird-ears-rtsp
    ports:
      - "8554:8554"
    restart: unless-stopped

  birdnet-go:
    image: ghcr.io/tphakala/birdnet-go:nightly
    container_name: bird-ears-birdnet
    # Bypass the entrypoint entirely — its chown/df/touch calls hang on macOS VirtioFS.
    # Run as the host user directly so no privilege operations are needed.
    user: "${BIRDNET_UID:-1000}:${BIRDNET_GID:-1000}"
    entrypoint: ["/usr/bin/birdnet-go"]
    command: ["realtime"]
    init: true
    stop_grace_period: 5s
    ports:
      - "${WEB_PORT:-8080}:8080"
    environment:
      - TZ=${TZ:-UTC}
      - HOME=/home/birdnet
      - BIRDNET_LATITUDE=${BIRDNET_LATITUDE}
      - BIRDNET_LONGITUDE=${BIRDNET_LONGITUDE}
      - BIRDNET_HOST=${BIRDNET_HOST}
    volumes:
      # Mount config directly to where birdnet-go looks for it (no symlink needed)
      - ./config:/home/birdnet/.config/birdnet-go
      - ./data:/data
    tmpfs:
      - /home/birdnet/.config/birdnet-go/hls:exec,size=50M,uid=${BIRDNET_UID:-1000},gid=${BIRDNET_GID:-1000},mode=0755
    depends_on:
      - mediamtx
    restart: unless-stopped
